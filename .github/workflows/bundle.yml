name: Bundle and upload to Play Console

on:
  push:
    branches: [ main, develop, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-bundle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/gomuks.keystore

      # Only the base flavor is published to the Play Console (package pt.aguiarvieira.andromuks).
      - name: Build Bundle (base flavor)
        env:
          KEYSTORE_FILE: gomuks.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleBaseRelease --stacktrace --no-daemon --parallel --build-cache

      - name: Locate AAB
        run: echo "AAB_PATH=$(find app/build/outputs/bundle/baseRelease -name '*.aab' | head -1)" >> $GITHUB_ENV

      - name: Upload .aab to Internal Track
        id: upload_internal
        uses: KevinRohn/github-action-upload-play-store@v1.0.2
        with:
          service_account_json: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          package_name: "pt.aguiarvieira.andromuks"
          aab_file_path: ${{ env.AAB_PATH }}
          track: "internal"
          release_status: "draft"
