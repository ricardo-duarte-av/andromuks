name: AV Andromuks

on:
  push:
    branches: [ main, develop, master ]
    # Don't burn CI on doc-only changes.
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # One job per product flavor (replaces the old build / build-a / build-b / build-c files and
    # their sed hacks — variant identity now lives in product flavors in app/build.gradle.kts).
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: base
            gradleFlavor: Base
            tag: ''            # asset/artifact suffix; empty for base
            id_debug: 248878640
            id_release: 249916670
          - flavor: a
            gradleFlavor: A
            tag: '-A'
            id_debug: 281695944
            id_release: 281695559
          - flavor: b
            gradleFlavor: B
            tag: '-B'
            id_debug: 281696400
            id_release: 281696024
          - flavor: c
            gradleFlavor: C
            tag: '-C'
            id_debug: 281696518
            id_release: 281696449

    steps:
      - uses: actions/checkout@v4

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      # Release signing: decode the keystore from a base64 Secret; passwords come from Secrets via
      # env in the build step (app/build.gradle.kts reads KEYSTORE_*/KEY_* from the environment).
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/gomuks.keystore

      # For the base flavor we additionally build the Play Store AAB in the SAME Gradle invocation
      # so the compile + R8 task outputs are shared with the APKs (no double compilation). Only base
      # is published to the Play Console, so the other flavors build APKs only.
      - name: Build ${{ matrix.flavor }} flavor (debug + release APKs, +AAB for base)
        env:
          KEYSTORE_FILE: gomuks.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          TASKS="assemble${{ matrix.gradleFlavor }}"
          if [ "${{ matrix.flavor }}" = "base" ]; then
            TASKS="$TASKS bundleBaseRelease"
          fi
          ./gradlew $TASKS --stacktrace --no-daemon --parallel --build-cache

      # Resolve the actual APK paths instead of hardcoding the flavor/ABI/build-type filename order.
      - name: Locate built APKs
        run: |
          DEBUG_APK=$(find app/build/outputs/apk/${{ matrix.flavor }}/debug -name "*.apk" | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/${{ matrix.flavor }}/release -name "*.apk" | head -1)
          echo "DEBUG_APK=$DEBUG_APK" >> $GITHUB_ENV
          echo "RELEASE_APK=$RELEASE_APK" >> $GITHUB_ENV
          echo "### Built APKs (${{ matrix.flavor }} flavor)" >> $GITHUB_STEP_SUMMARY
          echo "- $DEBUG_APK" >> $GITHUB_STEP_SUMMARY
          echo "- $RELEASE_APK" >> $GITHUB_STEP_SUMMARY

      - name: Upload R8 missing rules
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: r8-missing-rules-${{ matrix.flavor }}
          path: app/build/outputs/mapping/${{ matrix.flavor }}Release/missing_rules.txt
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pt.aguiarvieira.andromuks${{ matrix.tag }}-debug
          path: ${{ env.DEBUG_APK }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: pt.aguiarvieira.andromuks${{ matrix.tag }}-release
          path: ${{ env.RELEASE_APK }}

      - name: Deploy Nightly Debug
        uses: WebFreak001/deploy-nightly@v3.1.0
        with:
          upload_url: https://uploads.github.com/repos/ricardo-duarte-av/andromuks/releases/${{ matrix.id_debug }}/assets{?name,label}
          release_id: ${{ matrix.id_debug }}
          asset_path: ${{ env.DEBUG_APK }}
          asset_name: andromuks.aguiarvieira.pt-debug${{ matrix.tag }}-$$.apk
          asset_content_type: application/vnd.android.package-archive
          max_releases: 1

      - name: Deploy Nightly Release
        uses: WebFreak001/deploy-nightly@v3.1.0
        with:
          upload_url: https://uploads.github.com/repos/ricardo-duarte-av/andromuks/releases/${{ matrix.id_release }}/assets{?name,label}
          release_id: ${{ matrix.id_release }}
          asset_path: ${{ env.RELEASE_APK }}
          asset_name: andromuks.aguiarvieira.pt-release${{ matrix.tag }}-$$.apk
          asset_content_type: application/vnd.android.package-archive
          max_releases: 1

      # --- Play Store publishing (base flavor only) ---
      # The AAB was built above in the same Gradle invocation as the base APKs.
      - name: Locate AAB
        if: matrix.flavor == 'base'
        run: echo "AAB_PATH=$(find app/build/outputs/bundle/baseRelease -name '*.aab' | head -1)" >> $GITHUB_ENV

      - name: Upload AAB artifact
        if: matrix.flavor == 'base'
        uses: actions/upload-artifact@v4
        with:
          name: pt.aguiarvieira.andromuks-release-aab
          path: ${{ env.AAB_PATH }}

      # r0adkll/upload-google-play handles the resumable upload with retries/timeouts internally,
      # replacing the previous KevinRohn action whose single-shot .execute() failed on a transient
      # socket read timeout.
      - name: Upload .aab to Internal Track
        if: matrix.flavor == 'base'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: pt.aguiarvieira.andromuks
          releaseFiles: ${{ env.AAB_PATH }}
          track: internal
          status: draft
